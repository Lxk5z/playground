<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
</head>
<body>
  
  <div class="game game1">
    <script src="https://cdn.htmlgames.com/embed.js?game=RedAndGreen2&bgcolor=white"></script>
  </div>

  <!-- Beispiel: weitere Spiele -->
  <div class="game game2" style="display:none;">
     <script src="https://cdn.htmlgames.com/embed.js?game=GoldMine&amp;bgcolor=white"></script>
  </div>

  <div class="game game3" style="display:none;">
      <script src="https://cdn.htmlgames.com/embed.js?game=TrafficControl&amp;bgcolor=white"></script>
  </div>

   <div class="game game4" style="display:none;"> 
      <script src="https://cdn.htmlgames.com/embed.js?game=HappyBird&amp;bgcolor=white"></script>
   </div>

    <div class="game game5" style="display:none;">
     <iframe src="https://cloud.onlinegames.io/games/2025/unity/fast-food-rush/index-og.html"
            frameborder="0"
            allowfullscreen
            style="width:100%; height:100%;">
     </iframe>
    </div>

    <div class="game game6" style="display:none;">
        <iframe src="https://cloud.onlinegames.io/games/2024/unity3/block-blast/index-og.html"
            frameborder="0"
            allowfullscreen
            style="width:100%; height:100%;">
     </iframe>
    </div>

    <div class="game game7" style="display:none;">
        <iframe src="https://www.onlinegames.io/games/2022/unity/survival-craft/index.html"
            frameborder="0"
            allowfullscreen
            style="width:100%; height:100%;">
     </iframe>
    </div>

    

  <div class="navbar">
      <button id="prevBtn">(&lt;)</button>
      <input id="gameName" type="text" readonly>
      <button id="nextBtn">(&gt;)</button>
  </div>

    <style>
        body {
            overflow: hidden;
            background: black;
            margin: 0;
            padding: 0;
        }

        .game {
            width: 100%;
            height: calc(100vh - 60px);
        }

        .navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            box-sizing: border-box;
            color: white;
            font-family: sans-serif;
        }

        .navbar button {
            background: #444;
            color: white;
            border: none;
            height: 16px;
            padding: 0 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .navbar input {
            width: 120px;
            text-align: center;
            background: #333;
            color: white;
            border: none;
            height: 16px;
            font-size: 12px;
        }
    </style>

    <script>
        const games = document.querySelectorAll('.game');
        const gameNameField = document.getElementById('gameName');

        let currentIndex = 0;

        function updateGame() {
            games.forEach((g, i) => {
                g.style.display = i === currentIndex ? 'block' : 'none';
            });

            gameNameField.value = "Game " + (currentIndex + 1);
        }

        document.getElementById('prevBtn').onclick = () => {
            currentIndex = (currentIndex - 1 + games.length) % games.length;
            updateGame();
        };

        document.getElementById('nextBtn').onclick = () => {
            currentIndex = (currentIndex + 1) % games.length;
            updateGame();
        };

        updateGame();
    </script>

</body>
</html>
