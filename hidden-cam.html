<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hidden Cam Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: black;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            cursor: default;
            /* Drückt den Inhalt in die Safe-Areas, aber lässt den Hintergrund fließen */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        #initOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            background: transparent;
        }

        #cameraStream {
            position: absolute;
            top: 0; left: 0;
            width: 1px; height: 1px;
            opacity: 0.01;
            pointer-events: none;
        }

        #menu {
            display: none; 
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            z-index: 150;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            flex-direction: column;
            align-items: center;
            min-width: 300px;
        }

        .menu-btn {
            width: 100%;
            padding: 14px;
            margin: 6px 0;
            font-size: 16px;
            border-radius: 14px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .menu-btn:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.2); }

        #previewContainer {
            margin-top: 15px;
            width: 100%;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #miniPreview {
            width: 100%;
            height: 120px;
            background: #000;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .switch-btn {
            width: 60px;
            height: 120px;
            font-size: 24px;
        }

        .bg-row { display: flex; width: 100%; gap: 10px; margin-top: 6px; }
        .delete-btn { width: 60px; background: rgba(240, 42, 32, 0.4); border: 1px solid rgba(200, 30, 21, 0.5); }
        #statusText { color: rgba(255, 255, 255, 0.5); font-size: 12px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        #bgInput { display: none; }
    </style>
</head>
<body>

    <div id="initOverlay"></div>
    <input type="file" id="bgInput" accept="image/*">

    <video id="cameraStream" autoplay playsinline muted></video>
    <canvas id="photoCanvas" style="display:none;"></canvas>

    <div id="menu">
        <div id="statusText">Bereit</div>
        
        <div id="mainOptions" style="width: 100%;">
            <button class="menu-btn" onclick="startVideoMode(event)">🎥 Video starten</button>
            <button class="menu-btn" onclick="startPhotoMode(event)">📸 Foto-Modus</button>
            <div class="bg-row">
                <button class="menu-btn" onclick="triggerBgUpload(event)">🖼️ Hintergrund</button>
                <button class="menu-btn delete-btn" onclick="resetBackground(event)">🗑️</button>
            </div>
        </div>

        <div id="videoOptions" style="display:none; width: 100%;">
            <button class="menu-btn" style="color: #32d74b;" onclick="stopAndSaveVideo(event)">💾 Video sichern</button>
            <button class="menu-btn delete-btn" style="width: 100%; margin-top: 10px;" onclick="cancelRecording(event)">🚫 Aufnahme abbrechen</button>
        </div>

        <div id="photoOptions" style="display:none; width: 100%;">
            <button class="menu-btn" style="color: #32d74b;" onclick="savePhotosToZip(event)">📦 Fotos sichern (.zip)</button>
            <button class="menu-btn delete-btn" style="width: 100%; margin-top: 10px;" onclick="exitPhotoMode(event)">🚫 Fotomodus abbrechen</button>
        </div>

        <div id="previewContainer">
            <video id="miniPreview" autoplay playsinline muted></video>
            <button class="menu-btn switch-btn" onclick="switchCamera(event)">🔄</button>
        </div>
    </div>

    <script>
        let stream;
        let mediaRecorder;
        let videoChunks = [];
        let photoBlobs = [];
        let currentMode = 'none';
        let cameraInitialized = false;
        let currentFacingMode = 'environment';
        
        const videoEl = document.getElementById('cameraStream');
        const miniPreview = document.getElementById('miniPreview');
        const canvas = document.getElementById('photoCanvas');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu');
        const initOverlay = document.getElementById('initOverlay');
        const bgInput = document.getElementById('bgInput');

        async function initCamera() {
            if (stream) { stream.getTracks().forEach(track => track.stop()); }
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                    audio: true 
                });
                videoEl.srcObject = stream;
                miniPreview.srcObject = stream;
                cameraInitialized = true;
                initOverlay.style.display = 'none';
            } catch (err) {
                alert("Kamera-Fehler: " + err);
            }
        }

        async function switchCamera(e) {
            e.stopPropagation();
            currentFacingMode = (currentFacingMode === 'environment') ? 'user' : 'environment';
            await initCamera();
        }

        function triggerBgUpload(e) { e.stopPropagation(); bgInput.click(); }
        
        bgInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        document.body.style.backgroundImage = `url('${ev.target.result}')`;
                        
                        // Pixel-Analyse für Statusleisten-Tarnung
                        const colorCanvas = document.createElement('canvas');
                        const colorCtx = colorCanvas.getContext('2d');
                        colorCanvas.width = img.width;
                        colorCanvas.height = img.height;
                        colorCtx.drawImage(img, 0, 0);
                        
                        // Pickt den Pixel oben mittig
                        const pixelData = colorCtx.getImageData(Math.floor(img.width / 2), 0, 1, 1).data;
                        const rgbColor = `rgb(${pixelData[0]}, ${pixelData[1]}, ${pixelData[2]})`;
                        
                        document.body.style.backgroundColor = rgbColor;
                        console.log("Statusleiste getarnt mit: " + rgbColor);
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        function resetBackground(e) { 
            e.stopPropagation(); 
            document.body.style.backgroundImage = 'none'; 
            document.body.style.backgroundColor = 'black'; 
        }

        function handleGlobalClick(e) {
            if (!cameraInitialized) { initCamera(); return; }
            if (menu.style.display === 'flex') {
                if (!menu.contains(e.target)) menu.style.display = 'none';
                return;
            }
            if (currentMode === 'photo') takePhoto();
        }

        document.addEventListener('click', handleGlobalClick);

        let touchStartY = 0;
        let isThreeFingers = false;
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length === 3) {
                isThreeFingers = true;
                touchStartY = (e.touches[0].clientY + e.touches[1].clientY + e.touches[2].clientY) / 3;
            }
        });

        document.addEventListener('touchmove', (e) => {
            if (!isThreeFingers || e.touches.length !== 3) return;
            let currentY = (e.touches[0].clientY + e.touches[1].clientY + e.touches[2].clientY) / 3;
            if (touchStartY - currentY > 60) { openMenu(); isThreeFingers = false; }
        });

        document.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'm') openMenu(); });

        function openMenu() {
            menu.style.display = 'flex';
            const status = document.getElementById('statusText');
            const main = document.getElementById('mainOptions');
            const vid = document.getElementById('videoOptions');
            const phot = document.getElementById('photoOptions');

            main.style.display = currentMode === 'none' ? 'block' : 'none';
            vid.style.display = currentMode === 'recording' ? 'block' : 'none';
            phot.style.display = currentMode === 'photo' ? 'block' : 'none';

            if (currentMode === 'recording') status.innerText = "🔴 Aufnahme läuft";
            else if (currentMode === 'photo') status.innerText = `📸 Modus (${photoBlobs.length} Bilder)`;
            else status.innerText = "Bereit";
        }

        function startVideoMode(e) {
            e.stopPropagation();
            videoChunks = [];
            const mimeType = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
            mediaRecorder = new MediaRecorder(stream, { mimeType });
            mediaRecorder.ondataavailable = (ev) => { if (ev.data.size > 0) videoChunks.push(ev.data); };
            mediaRecorder.start(1000);
            currentMode = 'recording';
            menu.style.display = 'none';
        }

        function stopAndSaveVideo(e) {
            e.stopPropagation();
            mediaRecorder.onstop = () => {
                const blob = new Blob(videoChunks, { type: 'video/mp4' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `Video_${Date.now()}.mp4`;
                a.click();
            };
            mediaRecorder.stop();
            currentMode = 'none';
            menu.style.display = 'none';
        }

        function cancelRecording(e) {
            e.stopPropagation();
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.onstop = null; 
                mediaRecorder.stop();
            }
            videoChunks = [];
            currentMode = 'none';
            menu.style.display = 'none';
        }

        function startPhotoMode(e) {
            e.stopPropagation();
            currentMode = 'photo';
            photoBlobs = [];
            canvas.width = videoEl.videoWidth || 1920;
            canvas.height = videoEl.videoHeight || 1080;
            menu.style.display = 'none';
        }

        function takePhoto() {
            ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
            canvas.toBlob((blob) => { photoBlobs.push(blob); }, 'image/jpeg', 0.95);
        }

        async function savePhotosToZip(e) {
            e.stopPropagation();
            if (photoBlobs.length === 0) return exitPhotoMode(e);
            const zip = new JSZip();
            photoBlobs.forEach((b, i) => zip.file(`img_${i+1}.jpg`, b));
            const content = await zip.generateAsync({ type: "blob" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(content);
            a.download = `Fotos_${Date.now()}.zip`;
            a.click();
            exitPhotoMode(e);
        }

        function exitPhotoMode(e) { if(e) e.stopPropagation(); currentMode = 'none'; menu.style.display = 'none'; }
    </script>
</body>
</html>
